services:
  postgres:
    image: postgres:16-alpine
    container_name: secretaria-cim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secretaria_cim
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secretaria_cim"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Adminer opcional para gerenciamento do banco via web
  adminer:
    image: adminer:latest
    container_name: secretaria-cim-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
